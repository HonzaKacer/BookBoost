name: Book Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1,3,5'

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Stáhni repository
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Nainstaluj knihovny
        run: pip install requests beautifulsoup4 Pillow imagehash

      - name: Spusť AbeBooks skript
        run: python watch.py

      - name: Spusť Bazoš skript
        run: python bazos_watcher.py

      - name: Ulož stav zpět do repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json state_bazos.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
